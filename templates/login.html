<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(0, 0, 0, 0.08), transparent 30%),
                linear-gradient(180deg, #f8f8f8 0%, #ededed 100%);
        }

        .auth-panel {
            max-width: 460px;
        }

        .auth-card {
            border: 1px solid rgba(17, 17, 17, 0.1);
            border-radius: 28px;
            box-shadow: 0 22px 50px rgba(0, 0, 0, 0.08);
            background: rgba(255, 255, 255, 0.95);
        }

        .form-control {
            border-radius: 14px;
            border-color: rgba(17, 17, 17, 0.14);
            padding: 0.8rem 0.95rem;
        }

        .form-control:focus {
            border-color: #111111;
            box-shadow: 0 0 0 0.2rem rgba(17, 17, 17, 0.08);
        }

        .swal2-popup {
            border-radius: 24px;
            border: 1px solid rgba(17, 17, 17, 0.12);
            box-shadow: 0 28px 60px rgba(0, 0, 0, 0.18);
        }

        .flash-popup {
            padding: 1.25rem;
        }

        .flash-title {
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .flash-confirm {
            border: 1px solid #111111;
            border-radius: 999px;
            background: #111111;
            color: #ffffff;
            padding: 0.7rem 1.2rem;
            font-weight: 700;
        }

        .flash-confirm:hover {
            background: #000000;
            color: #ffffff;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center px-3">
    <div class="container auth-panel">
        <div class="card auth-card border-0 p-4 p-lg-5">
            <div class="text-center mb-4">
                <p class="text-uppercase text-muted fw-bold small mb-2">Expense Tracker</p>
                <h2 class="fw-bold">Login</h2>
                <p class="text-muted mb-0">Access your dashboard and continue tracking your spending.</p>
            </div>

            <form action="/login" method="POST">
                <div class="mb-3">
                    <label for="email" class="form-label text-muted">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label text-muted">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-dark w-100 rounded-4 py-2">Login</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    {% with messages = get_flashed_messages(with_categories=True) %}
        {% if messages %}
            {% for category, message in messages %}
                <script>
                    Swal.fire({
                        icon: "{{ category }}",
                        title: "{{ message }}",
                        background: "#f8f8f8",
                        color: "#111111",
                        timer: 2000,
                        timerProgressBar: true,
                        showConfirmButton: true,
                        confirmButtonText: "OK",
                        buttonsStyling: false,
                        customClass: {
                            popup: "flash-popup",
                            title: "flash-title",
                            confirmButton: "flash-confirm"
                        }
                    })
                </script>
            {% endfor %}
        {% endif %}
    {% endwith %}
</body>
</html>
