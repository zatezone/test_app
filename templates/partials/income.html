<div class="card dashboard-card border-0">
    <div class="card-body">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
            <div>
                <h3 class="section-title">Income Categories</h3>
                <p class="text-muted mb-0">Tap a card to add a new income to that category.</p>
            </div>
            <div class="total-pill text-dark">
                Total: P{{ "%.2f"|format(total_income) }}
            </div>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-3">
            <div class="col">
                <button type="button" class="expense-grid-card p-4 w-100 btn" onclick="openIncomeModal('Salary')">
                    <div class="category-meta mb-3">Category</div>
                    <div class="category-name">Salary</div>
                    <div class="category-amount mt-3">
                        P{{ "%.2f"|format((income_totals | default({})).get("Salary", 0.00))}}
                    </div>
                </button>
            </div>

            <div class="col">
                <button type="button" class="expense-grid-card p-4 w-100 btn" onclick="openIncomeModal('Freelance')">
                    <div class="category-meta mb-3">Category</div>
                    <div class="category-name">Freelance</div>
                    <div class="category-amount mt-3">
                        P{{ "%.2f"|format((income_totals | default({})).get("Freelance", 0.00))}}
                    </div>
                </button>
            </div>

            <div class="col">
                <button type="button" class="expense-grid-card p-4 w-100 btn" onclick="openIncomeModal('Investment')">
                    <div class="category-meta mb-3">Category</div>
                    <div class="category-name">Investment</div>
                    <div class="category-amount mt-3">
                        P{{ "%.2f"|format((income_totals | default({})).get("Investment", 0.00))}}
                    </div>
                </button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="incomeModal" tabindex="-1" aria-labelledby="incomeModalLabel" aria-hidden="true">
    <div class="modal-fullscreen-sm-down modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="incomeModalLabel">Add Income to Category</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <form action="/add_income" method="POST">
                <div class="modal-body">
                    <input type="hidden" name="category" id="modalCategoryIncomeInput">
                    <input type="hidden" name="category_type" value="income">

                    <div class="modal-kicker">New Entry</div>
                    <div class="modal-note mb-4">
                        Fill in the amount, a short description, and the date
                    </div>

                    <div class="mb-3">
                        <label for="amount" class="form-label">How much did you earn?</label>
                        <input type="number" step="0.1" class="form-control" name="amount" required autofocus placeholder="0.00">
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label"> Description: </label>
                        <input type="text" class="form-control" name="description" placeholder="Description">
                    </div>

                    <div class="mb-3">
                        <label for="date" class="form-label"> Date </label>
                        <input type="date" class="form-control" name="date" id="modalIncomeDateInput" required> 
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-dark" data-bs-dismiss="modal"> Cancel </button>
                        <button type="submit" class="btn btn-dark"> Save Income </button>
                    </div>

                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function openIncomeModal(categoryName) {
        document.getElementById("incomeModalLabel").innerText = "Add Income to " + categoryName;
        document.getElementById("modalCategoryIncomeInput").value = categoryName;

        document.getElementById("modalIncomeDateInput").value = "{{ selected_date }}"
        
        var myModal = new bootstrap.Modal(document.getElementById('incomeModal'));
        myModal.show();
    }
</script>
