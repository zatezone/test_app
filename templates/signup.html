<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(0, 0, 0, 0.08), transparent 30%),
                linear-gradient(180deg, #f8f8f8 0%, #ededed 100%);
        }

        .auth-panel {
            max-width: 500px;
        }

        .auth-card {
            border: 1px solid rgba(17, 17, 17, 0.1);
            border-radius: 28px;
            box-shadow: 0 22px 50px rgba(0, 0, 0, 0.08);
            background: rgba(255, 255, 255, 0.95);
        }

        .form-control {
            border-radius: 14px;
            border-color: rgba(17, 17, 17, 0.14);
            padding: 0.8rem 0.95rem;
        }

        .form-control:focus {
            border-color: #111111;
            box-shadow: 0 0 0 0.2rem rgba(17, 17, 17, 0.08);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center px-3">
    <div class="container auth-panel">
        <div class="card auth-card border-0 p-4 p-lg-5">
            <div class="text-center mb-4">
                <p class="text-uppercase text-muted fw-bold small mb-2">Expense Tracker</p>
                <h2 class="fw-bold">Create Account</h2>
                <p class="text-muted mb-0">Start with a clean, focused workspace for your daily expenses.</p>
            </div>

            <form action="/signup" method="POST">
                <div class="mb-3">
                    <label for="name" class="form-label text-muted">Name</label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="Enter Name" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label text-muted">Email</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label text-muted">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Enter Password" required>
                </div>
                <button type="submit" class="btn btn-dark w-100 rounded-4 py-2">Sign Up</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
